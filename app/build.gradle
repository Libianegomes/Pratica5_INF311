plugins {
    id 'com.android.application'
}

android {
    namespace 'br.ufv.inf311.checkinlocais'
    compileSdk 35

    defaultConfig {
        applicationId 'br.ufv.inf311.checkinlocais'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'

        manifestPlaceholders = [
                MAPS_API_KEY: project.findProperty('MAPS_API_KEY') ?: 'INSIRA_SUA_CHAVE_AQUI'
        ]
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.gms:play-services-maps:19.0.0'
    implementation 'com.google.android.gms:play-services-location:21.3.0'
}
